name: Build Windows Release
on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Build Windows EXE
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File packaging\build_windows_exe.ps1

      - name: Pack Windows build
        id: pack
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $zipPath = "backend\dist\AutoTool-v$version-windows.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path "backend\dist\AutoTool" -DestinationPath $zipPath -Force
          "ZIP_PATH=$zipPath" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Auto Tool v${{ steps.version.outputs.VERSION }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ${{ steps.pack.outputs.ZIP_PATH }}
          token: ${{ secrets.GITHUB_TOKEN }}
